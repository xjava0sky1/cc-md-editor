name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install JS dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'MD Editor ${{ github.ref_name }}'
          releaseBody: |
            ## Instalace

            1. Stáhni `.dmg` níže.
            2. Otevři ho a přetáhni MD Editor do Applications.
            3. **Při prvním spuštění**: klikni na appku pravým tlačítkem → **Open** → v dialogu znovu **Open**. (Appka není notarizovaná u Apple, proto ten extra krok.)

            Pro macOS 11+ na Apple Silicon (M1/M2/M3/M4).
          releaseDraft: false
          prerelease: false
          args: --target aarch64-apple-darwin
