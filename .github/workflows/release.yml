name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # plná historie pro auto-gen release notes

      - name: Create draft release with auto-generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Vytvoř draft release a nech GitHub vygenerovat notes z commitů
          gh release create "${{ github.ref_name }}" \
            --title "MD Editor ${{ github.ref_name }}" \
            --generate-notes \
            --draft

          # Přidej na začátek statické instrukce k instalaci
          cat > /tmp/install.md <<'INSTALL_EOF'
          ## Instalace

          Pro macOS 11+ na Apple Silicon (M1/M2/M3/M4).

          1. Stáhni `.dmg` níže.
          2. Otevři ho a přetáhni **MD Editor** do Applications.
          3. **Odblokuj appku** (povinný krok — jinak macOS ukáže `„MD Editor" je poškozena a nelze ji otevřít`). Appka není rozbitá, je to Gatekeeper, protože build není notarizovaný u Apple. V Terminálu spusť:

             ```bash
             xattr -cr "/Applications/MD Editor.app"
             ```

          4. Otevři **MD Editor** normálně z Applications / Launchpadu / Spotlightu.

          > Obcházka „klik pravým → Open" na novějších macOS (Sonoma/Sequoia) obvykle nefunguje — použij terminálový příkaz výše. Příkaz je potřeba spustit znovu při každém novém releasu.

          INSTALL_EOF

          gh release view "${{ github.ref_name }}" --json body --jq .body >> /tmp/install.md
          gh release edit "${{ github.ref_name }}" --notes-file /tmp/install.md

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install JS dependencies
        run: npm ci

      - name: Build and upload assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          args: --target aarch64-apple-darwin

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --draft=false
